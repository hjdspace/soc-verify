name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package_script: package:win
            runner_output: resources/binaries/socverify-runner.exe
            runner_asset: socverify-runner-windows-x64.exe
          - name: Linux
            os: ubuntu-latest
            package_script: package:linux
            runner_output: resources/binaries/socverify-runner
            runner_asset: socverify-runner-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install app dependencies
        run: npm ci

      - name: Install engine dependencies
        run: bun install --frozen-lockfile
        working-directory: engine/oh-my-pi

      - name: Build agent runner
        run: npm run build:runner

      - name: Package desktop app
        run: npm run ${{ matrix.package_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload runner binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.os }}
          path: ${{ matrix.runner_output }}

  upload-runner-assets:
    name: Upload runner binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download runner artifacts
        uses: actions/download-artifact@v4
        with:
          path: runner-artifacts
          merge-multiple: true

      - name: Upload runner binaries to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for f in runner-artifacts/*; do
            [ -e "$f" ] || continue
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done

  publish-release:
    name: Publish GitHub Release
    needs: [build, upload-runner-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="release-notes/v${{ steps.version.outputs.value }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::warning::Missing release notes file: $NOTES_FILE, using empty notes"
            echo "body=_" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<__RELEASE_NOTES__'
              cat "$NOTES_FILE"
              echo
              echo '__RELEASE_NOTES__'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false --notes "${{ steps.release_notes.outputs.body }}"
          echo "Release published with release notes."

<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="SoC Verify · chip top view">
  <!-- Black background -->
  <rect width="256" height="256" rx="56" fill="#0A0A0A"/>

  <!-- Pins (white) -->
  <g fill="#FFFFFF">
    <rect x="84"  y="36" width="10" height="20" rx="2"/>
    <rect x="123" y="36" width="10" height="20" rx="2"/>
    <rect x="162" y="36" width="10" height="20" rx="2"/>
    <rect x="84"  y="200" width="10" height="20" rx="2"/>
    <rect x="123" y="200" width="10" height="20" rx="2"/>
    <rect x="162" y="200" width="10" height="20" rx="2"/>
    <rect x="36" y="84"  width="20" height="10" rx="2"/>
    <rect x="36" y="123" width="20" height="10" rx="2"/>
    <rect x="36" y="162" width="20" height="10" rx="2"/>
    <rect x="200" y="84"  width="20" height="10" rx="2"/>
    <rect x="200" y="123" width="20" height="10" rx="2"/>
    <rect x="200" y="162" width="20" height="10" rx="2"/>
  </g>

  <!-- Die outline -->
  <rect x="60" y="60" width="136" height="136" rx="16" fill="none" stroke="#FFFFFF" stroke-width="8"/>

  <!-- Cross bus -->
  <rect x="118" y="60"  width="20" height="136" fill="#0A0A0A"/>
  <rect x="60"  y="118" width="136" height="20" fill="#0A0A0A"/>
  <line x1="128" y1="60"  x2="128" y2="196" stroke="#FFFFFF" stroke-width="4"/>
  <line x1="60"  y1="128" x2="196" y2="128" stroke="#FFFFFF" stroke-width="4"/>

  <!-- Center node -->

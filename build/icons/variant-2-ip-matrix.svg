<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="SoC Verify · IP matrix">
  <!-- Black background -->
  <rect width="256" height="256" rx="56" fill="#0A0A0A"/>

  <!-- Die outline -->
  <rect x="52" y="52" width="152" height="152" rx="12" fill="none" stroke="#FFFFFF" stroke-width="7"/>

  <!-- Quad partition -->
  <line x1="128" y1="52" x2="128" y2="204" stroke="#FFFFFF" stroke-width="4"/>
  <line x1="52"  y1="128" x2="204" y2="128" stroke="#FFFFFF" stroke-width="4"/>

  <!-- Q1: 2x2 dots -->
  <g fill="#FFFFFF">
    <circle cx="82"  cy="82"  r="7"/>
    <circle cx="106" cy="82"  r="7"/>
    <circle cx="82"  cy="106" r="7"/>
    <circle cx="106" cy="106" r="7"/>
  </g>

  <!-- Q2: horizontal bars -->
  <g fill="#FFFFFF">
    <rect x="148" y="72"  width="40" height="7" rx="2"/>
    <rect x="148" y="88"  width="40" height="7" rx="2"/>
    <rect x="148" y="104" width="40" height="7" rx="2"/>
  </g>

  <!-- Q3: vertical bars -->
  <g fill="#FFFFFF">
    <rect x="72"  y="148" width="7" height="40" rx="2"/>
    <rect x="88"  y="148" width="7" height="40" rx="2"/>
    <rect x="104" y="148" width="7" height="40" rx="2"/>
  </g>

  <!-- Q4: ring -->
  <g fill="none" stroke="#FFFFFF" stroke-width="5">
    <rect x="150" y="150" width="28" height="28" rx="4"/>
  </g>
  <circle cx="164" cy="164" r="5" fill="#FFFFFF"/>

  <!-- Center hub -->
  <circle cx="128" cy="128" r="9" fill="#FFFFFF"/>
  <circle cx="128" cy="128" r="3" fill="#0A0A0A"/>
</svg>

<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="SoC Verify · die outline">
  <!-- Black background -->
  <rect width="256" height="256" rx="56" fill="#0A0A0A"/>

  <!-- Pins -->
  <g fill="#FFFFFF">
    <rect x="88"  y="40" width="8" height="18" rx="2"/>
    <rect x="124" y="40" width="8" height="18" rx="2"/>
    <rect x="160" y="40" width="8" height="18" rx="2"/>
    <rect x="88"  y="198" width="8" height="18" rx="2"/>
    <rect x="124" y="198" width="8" height="18" rx="2"/>
    <rect x="160" y="198" width="8" height="18" rx="2"/>
    <rect x="40" y="88"  width="18" height="8" rx="2"/>
    <rect x="40" y="124" width="18" height="8" rx="2"/>
    <rect x="40" y="160" width="18" height="8" rx="2"/>
    <rect x="198" y="88"  width="18" height="8" rx="2"/>
    <rect x="198" y="124" width="18" height="8" rx="2"/>
    <rect x="198" y="160" width="18" height="8" rx="2"/>
  </g>

  <!-- Die body -->
  <rect x="64" y="64" width="128" height="128" rx="10" fill="none" stroke="#FFFFFF" stroke-width="7"/>

  <!-- Inner floorplan lines (subtle) -->
  <rect x="84" y="84" width="88" height="88" rx="4" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3"/>

  <!-- SoC text mark -->
  <text x="128" y="142" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">SoC</text>
</svg>

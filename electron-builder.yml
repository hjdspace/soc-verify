appId: com.socverify.app
productName: SoC Verify
compression: store
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: plugins
    to: plugins
    filter: ["**/*"]
  - from: resources/binaries
    to: binaries
    filter: ["**/*", "!README.md"]
  # engine/oh-my-pi is no longer packaged as extraResources.
  # The runner is pre-compiled into a standalone binary in resources/binaries/.
  # This eliminates the need to bundle the entire engine source + node_modules.
asarUnpack:
  - resources/binaries/**
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
  category: Development

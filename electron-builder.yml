appId: com.socverify.app
productName: SoC Verify
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: plugins
    to: plugins
    filter: ["**/*"]
  - from: resources/binaries
    to: binaries
    filter: ["**/*", "!README.md"]
  - from: engine/oh-my-pi
    to: engine/oh-my-pi
    filter:
      - "**/*"
      - "!node_modules"
      - "!**/node_modules"
      - "!**/.git"
      - "!**/dist"
      - "!**/*.lock"
      - "!**/target"
asarUnpack:
  - resources/binaries/**
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
  category: Development

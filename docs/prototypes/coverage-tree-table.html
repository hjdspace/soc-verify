<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoC Verify · 覆盖率树表格原型</title>
<style>
  :root {
    --bg: oklch(0.15 0.008 250);
    --bg-surface: oklch(0.19 0.008 250);
    --bg-elevated: oklch(0.22 0.009 250);
    --bg-hover: oklch(0.24 0.010 250);
    --fg: oklch(0.95 0.004 250);
    --fg-dim: oklch(0.66 0.010 250);
    --fg-faint: oklch(0.46 0.008 250);
    --border: oklch(0.27 0.008 250);
    --border-strong: oklch(0.33 0.010 250);
    --c-pass: oklch(0.72 0.15 145);
    --c-warn: oklch(0.78 0.14 75);
    --c-fail: oklch(0.65 0.18 25);
    --c-na: oklch(0.50 0.012 250);
    --c-accent: oklch(0.68 0.14 250);
    --c-accent-soft: oklch(0.22 0.04 250);
    --shadow: 0 1px 3px oklch(0.05 0 0 / 0.3);
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--fg); font-family: var(--sans); padding: 28px 32px 80px; font-size: 13px; line-height: 1.5; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .badge { font-size: 10px; font-weight: 700; padding: 4px 11px; border-radius: 20px; background: var(--c-accent-soft); color: var(--c-accent); text-transform: uppercase; letter-spacing: 0.06em; border: 1px solid oklch(0.30 0.05 250); }
  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .toolbar select, .toolbar input { background: var(--bg-surface); border: 1px solid var(--border); color: var(--fg); font-family: var(--sans); font-size: 12px; padding: 6px 11px; border-radius: 7px; outline: none; transition: border-color 0.15s; }
  .toolbar select:focus, .toolbar input:focus { border-color: var(--c-accent); }
  .btn { background: var(--bg-surface); border: 1px solid var(--border); color: var(--fg-dim); font-size: 11px; font-weight: 500; padding: 6px 13px; border-radius: 7px; cursor: pointer; transition: all 0.15s; font-family: var(--sans); }
  .btn:hover { color: var(--fg); border-color: var(--border-strong); background: var(--bg-elevated); }
  .btn.primary { background: var(--c-accent); color: oklch(0.15 0.01 250); border-color: var(--c-accent); font-weight: 600; }
  .btn.primary:hover { background: oklch(0.74 0.15 250); }
  .btn.active { color: var(--c-accent); border-color: oklch(0.30 0.05 250); background: var(--c-accent-soft); }

  /* Section title */
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-faint); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .section-title .st-meta { font-size: 10px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--fg-faint); }

  /* Card base */
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); }

  /* Overview cards */
  .ov-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .ov-card { padding: 16px 18px; transition: border-color 0.15s; }
  .ov-card:hover { border-color: var(--border-strong); }
  .ov-card .ov-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ov-card .ov-label { font-size: 11px; font-weight: 600; color: var(--fg-dim); }
  .ov-card .ov-icon { font-size: 13px; font-weight: 700; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .ov-card .ov-icon.pass { color: var(--c-pass); background: oklch(0.25 0.04 145); }
  .ov-card .ov-icon.warn { color: var(--c-warn); background: oklch(0.27 0.04 75); }
  .ov-card .ov-icon.fail { color: var(--c-fail); background: oklch(0.27 0.05 25); }
  .ov-card .ov-icon.na { color: var(--c-na); background: var(--bg-elevated); }
  .ov-card .ov-value { font-family: var(--mono); font-size: 24px; font-weight: 700; line-height: 1.1; }
  .ov-card .ov-count { font-size: 10px; color: var(--fg-faint); font-family: var(--mono); margin-top: 3px; }
  .ov-card .ov-bar { margin-top: 10px; height: 4px; border-radius: 2px; background: var(--bg-elevated); overflow: hidden; }
  .ov-card .ov-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .ov-card .ov-target { font-size: 9px; color: var(--fg-faint); margin-top: 6px; }

  /* Tree table */
  .tree-card { padding: 0; overflow: hidden; margin-bottom: 20px; }
  .tree-card .tc-header { padding: 14px 18px 10px; }
  .tree-table { width: 100%; border-collapse: collapse; }
  .tree-table thead th { background: var(--bg-elevated); color: var(--fg-faint); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 8px; text-align: right; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  .tree-table thead th:first-child { text-align: left; padding-left: 18px; }
  .tree-table thead th .th-target { display: block; font-size: 9px; color: var(--fg-faint); font-weight: 400; margin-top: 2px; text-transform: none; letter-spacing: 0; }
  .tree-table tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid oklch(0.22 0.008 250); font-family: var(--mono); font-size: 11px; color: var(--fg-dim); }
  .tree-table tbody td:first-child { text-align: left; padding-left: 18px; font-family: var(--sans); color: var(--fg); font-size: 12px; }
  .tree-table tbody tr:hover { background: var(--bg-hover); }
  .tree-table tbody tr.coll-child { display: none; }
  .tree-table tbody tr.dim { opacity: 0.32; }
  .tree-toggle { display: inline-flex; align-items: center; cursor: pointer; user-select: none; }
  .chev { width: 11px; height: 11px; transition: transform 0.15s; color: var(--fg-faint); flex-shrink: 0; }
  .chev.open { transform: rotate(90deg); }
  .chev.empty { visibility: hidden; }
  .tree-name { font-weight: 500; }
  .tree-name.has-children { font-weight: 600; }
  .cov-cell { display: inline-flex; flex-direction: column; align-items: flex-end; line-height: 1.25; }
  .cov-cell .pct { font-weight: 600; }
  .cov-cell .cnt { font-size: 9px; color: var(--fg-faint); }
  .cov-cell.pass .pct { color: var(--c-pass); }
  .cov-cell.warn .pct { color: var(--c-warn); }
  .cov-cell.fail .pct { color: var(--c-fail); }
  .cov-cell.na .pct { color: var(--c-na); }
  .cov-cell.na .cnt { display: none; }

  /* Floating AI status bar */
  .ai-bar { position: fixed; bottom: 20px; right: 20px; width: 280px; background: oklch(0.19 0.012 250 / 0.92); backdrop-filter: blur(8px); border: 1px solid oklch(0.33 0.05 250); border-radius: 10px; box-shadow: 0 8px 24px oklch(0.05 0 0 / 0.45); padding: 12px 14px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; z-index: 50; }
  .ai-bar:hover { border-color: var(--c-accent); transform: translateY(-1px); }
  .ai-bar .ai-row1 { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
  .ai-bar .ai-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--c-accent); box-shadow: 0 0 0 0 oklch(0.68 0.14 250 / 0.5); animation: pulse 1.8s infinite; flex-shrink: 0; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 oklch(0.68 0.14 250 / 0.5); } 70% { box-shadow: 0 0 0 8px oklch(0.68 0.14 250 / 0); } 100% { box-shadow: 0 0 0 0 oklch(0.68 0.14 250 / 0); } }
  .ai-bar .ai-title { font-size: 12px; font-weight: 700; color: var(--fg); }
  .ai-bar .ai-mod { font-family: var(--mono); font-size: 11px; color: var(--c-accent); font-weight: 600; margin-left: auto; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ai-bar .ai-row2 { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--fg-dim); font-family: var(--mono); }
  .ai-bar .ai-delta { color: var(--c-pass); font-weight: 600; }
  .ai-bar .ai-hint { font-size: 9px; color: var(--fg-faint); font-family: var(--sans); }

  /* Legend */
  .legend { display: flex; gap: 18px; margin-top: 18px; font-size: 10px; color: var(--fg-dim); padding: 12px 0; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
  .legend-dot.pass { background: var(--c-pass); }
  .legend-dot.warn { background: var(--c-warn); }
  .legend-dot.fail { background: var(--c-fail); }
  .legend-dot.na { background: var(--c-na); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>覆盖率分析</h1>
    <span class="badge">方案 A · 树表格</span>
  </div>
  <div class="toolbar">
    <select>
      <option>Session: 2024-01-15_merge_001</option>
      <option>Session: 2024-01-10_merge_002</option>
    </select>
    <input id="filterInput" type="text" placeholder="过滤模块..." style="width: 130px;">
    <button class="btn" onclick="expandAll()">全部展开</button>
    <button class="btn" onclick="collapseAll()">全部折叠</button>
    <button class="btn" id="unmetBtn" onclick="toggleUnmet()">仅看未达标</button>
    <button class="btn" onclick="exportReport()">导出报告</button>
  </div>
</div>

<!-- 1. 顶部概览卡片条 -->
<div class="section-title">覆盖率总览 <span class="st-meta">8 项指标 · 对照行业目标</span></div>
<div class="ov-grid" id="ovGrid"></div>

<!-- 2. 主树表格 -->
<div class="card tree-card">
  <div class="tc-header">
    <div class="section-title" style="margin-bottom:0;">模块层级覆盖率 <span class="st-meta">点击展开/折叠</span></div>
  </div>
  <table class="tree-table">
    <thead><tr>
      <th>模块</th>
      <th>Line<span class="th-target">≥95%</span></th>
      <th>Branch<span class="th-target">≥90%</span></th>
      <th>Toggle<span class="th-target">≥85%</span></th>
      <th>Cond<span class="th-target">≥85%</span></th>
      <th>FSM St<span class="th-target">=100%</span></th>
      <th>FSM Tr<span class="th-target">≥90%</span></th>
      <th>Func<span class="th-target">=100%</span></th>
      <th>Assert</th>
    </tr></thead>
    <tbody id="treeBody"></tbody>
  </table>
</div>

<!-- 3. 浮动 AI 状态栏 -->
<div class="ai-bar" onclick="alert('跳转至覆盖率仪表盘 → AI Closure 详情面板')" title="查看详情→仪表盘">
  <div class="ai-row1">
    <span class="ai-pulse"></span>
    <span class="ai-title">AI Closure</span>
    <span class="ai-mod">u_analog_mipi_mphy_2t2r</span>
  </div>
  <div class="ai-row2">
    <span>轮次 <span style="color:var(--c-accent);font-weight:700">2</span>/5 · <span class="ai-delta">Δ +3.2%</span></span>
    <span class="ai-hint">查看详情→仪表盘</span>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot pass"></span>达标</div>
  <div class="legend-item"><span class="legend-dot warn"></span>接近目标 (&lt;5%)</div>
  <div class="legend-item"><span class="legend-dot fail"></span>未达标</div>
  <div class="legend-item"><span class="legend-dot na"></span>N/A</div>
</div>

<script>
const TARGETS = { line:95, branch:90, toggle:85, condition:85, fsm_state:100, fsm_transition:90, functional:100, assertion:null };
const METRICS = ['line','branch','toggle','condition','fsm_state','fsm_transition','functional','assertion'];
const ML = { line:'Line', branch:'Branch', toggle:'Toggle', condition:'Cond', fsm_state:'FSM St', fsm_transition:'FSM Tr', functional:'Func', assertion:'Assert' };

const tree = {
  name:'tb_top', depth:0, children:[
    { name:'chip_top', depth:1, children:[
      { name:'dut', depth:2, children:[
        { name:'u_analog_bb_line_usb', depth:3, m:{ line:{p:87.5,c:13,t:15}, branch:{p:80,c:8,t:10}, toggle:{p:75,c:30,t:40}, condition:{p:70,c:7,t:10} } },
        { name:'u_analog_bb_line_pciepl', depth:3, m:{ line:{p:87.5,c:13,t:15}, branch:{p:80,c:8,t:10}, toggle:{p:75,c:30,t:40}, condition:{p:70,c:7,t:10} } },
        { name:'u_block_wrap_0', depth:3, children:[
          { name:'u_analog_mipi_mphy_2t2r', depth:4, m:{ line:{p:58.42,c:482,t:825}, branch:{p:52.1,c:350,t:672}, toggle:{p:45.3,c:1200,t:2650}, condition:{p:48,c:96,t:200}, fsm_state:{p:66.7,c:4,t:6}, fsm_transition:{p:40,c:6,t:15}, assertion:{p:50,c:3,t:6} } },
          { name:'u_g3_side_glue_wrap', depth:4, m:{ line:{p:57.38,c:1007,t:1755}, branch:{p:50.2,c:700,t:1393}, toggle:{p:42.1,c:2500,t:5940}, condition:{p:45,c:180,t:400} } },
          { name:'analog_mipi_mphy_2t2r_glue', depth:4, m:{ line:{p:96.88,c:225,t:239}, branch:{p:92,c:161,t:175}, toggle:{p:88.5,c:450,t:508}, condition:{p:90,c:45,t:50} } },
          { name:'analog_mipi_mphy_2t2r_0_collar', depth:4, m:{ line:{p:84.23,c:963,t:1640}, branch:{p:78.5,c:630,t:802}, toggle:{p:72,c:1800,t:2500}, condition:{p:75,c:150,t:200} } },
          { name:'u_anlg_phy_g3_rf', depth:4, m:{ line:{p:79.97,c:1540,t:1974}, branch:{p:72.3,c:1100,t:1521}, toggle:{p:68.5,c:3200,t:4672}, condition:{p:70,c:280,t:400}, fsm_state:{p:80,c:8,t:10}, fsm_transition:{p:65,c:13,t:20} } },
          { name:'u_reg_dec', depth:4, m:{ line:{p:98.76,c:159,t:161}, branch:{p:96,c:96,t:100}, toggle:{p:92,c:230,t:250}, condition:{p:95,c:38,t:40} } },
          { name:'u_analog_mipi_mphy_2t2r_glue_logic', depth:4, m:{ line:{p:86.75,c:720,t:905}, branch:{p:80,c:560,t:700}, toggle:{p:78,c:1400,t:1795}, condition:{p:82,c:164,t:200} } },
          { name:'u_cgm_mux2x_mphy_cb_cfgclk', depth:4, m:{ line:{p:80,c:4,t:5}, branch:{p:75,c:3,t:4}, toggle:{p:70,c:14,t:20} } },
          { name:'u_clk_gate_reg_read', depth:4, m:{ line:{p:100,c:4,t:4}, branch:{p:100,c:2,t:2}, toggle:{p:100,c:8,t:8} } },
        ], m:{ line:{p:60.04,c:323,t:538}, branch:{p:52,c:260,t:500}, toggle:{p:48,c:800,t:1667}, condition:{p:50,c:100,t:200}, fsm_state:{p:66.7,c:4,t:6}, fsm_transition:{p:40,c:6,t:15}, assertion:{p:50,c:3,t:6} } },
      ], m:{ line:{p:93.07,c:349,t:375}, branch:{p:88,c:440,t:500}, toggle:{p:82,c:1230,t:1500}, condition:{p:85,c:170,t:200}, fsm_state:{p:80,c:8,t:10}, fsm_transition:{p:65,c:13,t:20}, assertion:{p:50,c:3,t:6} } },
    ], m:null },
  ], m:null
};

function classify(m,v){ if(!v) return 'na'; const t=TARGETS[m]; if(t===null) return v.p>=90?'pass':v.p>=80?'warn':'fail'; if(v.p>=t) return 'pass'; if(v.p>=t-5) return 'warn'; return 'fail'; }
function color(c){ return {pass:'var(--c-pass)',warn:'var(--c-warn)',fail:'var(--c-fail)',na:'var(--c-na)'}[c]; }
function icon(c){ return {pass:'✓',warn:'⚠',fail:'✗',na:'—'}[c]; }

// 概览卡片
function calcSummary(n){
  if(!n.m){ if(!n.children||!n.children.length) return null; const cs=n.children.map(c=>calcSummary(c)).filter(s=>s); if(!cs.length) return null; const s={}; for(const m of METRICS){ const vs=cs.map(x=>x[m]).filter(v=>v); if(!vs.length){s[m]=null;continue;} const tC=vs.reduce((a,v)=>a+v.c,0), tT=vs.reduce((a,v)=>a+v.t,0); s[m]={p:tT>0?tC/tT*100:0,c:tC,t:tT}; } return s; }
  return n.m;
}
const summary = calcSummary(tree);
let ovHtml='';
for(const m of METRICS){
  const v = summary?summary[m]:null;
  if(!v){ ovHtml+=`<div class="card ov-card"><div class="ov-top"><span class="ov-label">${ML[m]}</span><span class="ov-icon na">${icon('na')}</span></div><div class="ov-value" style="color:var(--c-na)">n/a</div><div class="ov-bar"><div class="ov-bar-fill" style="width:0;background:var(--c-na)"></div></div></div>`; continue; }
  const cls=classify(m,v); const t=TARGETS[m];
  const stTxt = cls==='pass'?'达标':cls==='warn'?'接近':cls==='fail'?'未达标':'无目标';
  ovHtml+=`<div class="card ov-card"><div class="ov-top"><span class="ov-label">${ML[m]}</span><span class="ov-icon ${cls}">${icon(cls)}</span></div><div class="ov-value" style="color:${color(cls)}">${v.p.toFixed(1)}%</div><div class="ov-count">${v.c}/${v.t}</div><div class="ov-bar"><div class="ov-bar-fill" style="width:${v.p}%;background:${color(cls)}"></div></div><div class="ov-target">${t?'目标 '+t+'% · '+stTxt:stTxt}</div></div>`;
}
document.getElementById('ovGrid').innerHTML=ovHtml;

// 树表格
function renderCell(m,v){ if(!v) return `<td><span class="cov-cell na"><span class="pct">n/a</span></span></td>`; const c=classify(m,v); return `<td><span class="cov-cell ${c}"><span class="pct">${v.p.toFixed(1)}%</span><span class="cnt">${v.c}/${v.t}</span></span></td>`; }
function renderNode(n){
  const hc=n.children&&n.children.length>0; const rid=`r-${n.name}-${n.depth}`;
  let h=`<tr id="${rid}" class="${n.depth>0?'coll-child':''}" data-depth="${n.depth}" data-name="${n.name}"><td><span class="tree-toggle" onclick="toggleNode('${rid}')"><svg class="chev ${hc?'open':'empty'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></span><span style="margin-left:${n.depth*15+4}px" class="tree-name ${hc?'has-children':''}">${n.name}</span></td>`;
  for(const m of METRICS) h+=renderCell(m,n.m?n.m[m]:null);
  h+=`</tr>`; if(hc) for(const c of n.children) h+=renderNode(c); return h;
}
document.getElementById('treeBody').innerHTML=renderNode(tree);

// 默认全部展开
document.querySelectorAll('.tree-table tbody tr').forEach((r)=>{ r.classList.remove('coll-child'); });

function toggleNode(rid){
  const r=document.getElementById(rid); if(!r) return;
  const ch=r.querySelector('.chev'); if(ch.classList.contains('empty')) return;
  const exp=ch.classList.contains('open'); ch.classList.toggle('open');
  const d=parseInt(r.dataset.depth);
  let n=r.nextElementSibling;
  while(n){ const nd=parseInt(n.dataset.depth); if(nd<=d) break; if(exp){ n.classList.add('coll-child'); } else { n.classList.remove('coll-child'); } n=n.nextElementSibling; }
}

function expandAll(){
  document.querySelectorAll('.tree-table tbody tr').forEach(r=>r.classList.remove('coll-child'));
  document.querySelectorAll('.tree-table .chev').forEach(c=>{ if(!c.classList.contains('empty')) c.classList.add('open'); });
}
function collapseAll(){
  document.querySelectorAll('.tree-table tbody tr').forEach(r=>{ if(parseInt(r.dataset.depth)>0) r.classList.add('coll-child'); });
  document.querySelectorAll('.tree-table .chev').forEach(c=>{ if(!c.classList.contains('empty')) c.classList.remove('open'); });
  // 根节点保持展开图标
  const root=document.querySelector('.tree-table tbody tr[data-depth="0"] .chev');
  if(root) root.classList.add('open');
  const rootRow=document.querySelector('.tree-table tbody tr[data-depth="0"]');
  if(rootRow) rootRow.classList.remove('coll-child');
}

// 仅看未达标
let unmetOnly=false;
function toggleUnmet(){
  unmetOnly=!unmetOnly;
  const btn=document.getElementById('unmetBtn');
  btn.classList.toggle('active',unmetOnly);
  document.querySelectorAll('.tree-table tbody tr').forEach(r=>{
    if(!unmetOnly){ r.classList.remove('dim'); return; }
    // 检查该行是否有 fail 状态的格
    const hasFail = r.querySelector('.cov-cell.fail');
    r.classList.toggle('dim', !hasFail);
  });
}

// 过滤
document.getElementById('filterInput').addEventListener('input', (e)=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.tree-table tbody tr').forEach(r=>{
    const nm=(r.dataset.name||'').toLowerCase();
    if(!q){ r.style.display=''; return; }
    r.style.display = nm.includes(q) ? '' : 'none';
  });
});

function exportReport(){ alert('导出覆盖率报告（原型占位）'); }
</script>

</body>
</html>
